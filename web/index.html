<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark" data-accent="slate">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SecureVault — Encrypted Password Manager</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2364748b' stroke-width='2'><rect x='4' y='10' width='16' height='11' rx='2'/><path d='M8 10V7a4 4 0 0 1 8 0v3'/></svg>">
<!-- Apply saved prefs BEFORE first paint to avoid any flash -->
<script>
(function(){
  var ls=window.localStorage, de=document.documentElement;
  var lang=ls.getItem('sv_lang')||'en', theme=ls.getItem('sv_theme')||'dark', accent=ls.getItem('sv_accent')||'slate';
  de.setAttribute('data-theme',theme);
  de.setAttribute('data-accent',accent);
  de.setAttribute('lang',lang);
  de.setAttribute('dir',lang==='ar'?'rtl':'ltr');
  de.classList.add('no-transition');
})();
</script>
<style>
  /* ===================== THEME TOKENS ===================== */
  :root[data-theme="dark"]{
    --bg:#0c0f18; --bg-2:#0f131f; --surface:rgba(22,26,38,.72); --surface-2:#171b28;
    --surface-3:#1e2434; --border:rgba(255,255,255,.08); --border-2:rgba(255,255,255,.14);
    --text:#e9ecf6; --muted:#9aa2ba; --faint:#666e88; --pattern:#aeb6d8;
    --shadow:0 24px 60px -24px rgba(0,0,0,.75);
  }
  :root[data-theme="light"]{
    --bg:#eef1f7; --bg-2:#e7ebf3; --surface:rgba(255,255,255,.78); --surface-2:#f4f6fb;
    --surface-3:#e9edf5; --border:rgba(20,28,50,.10); --border-2:rgba(20,28,50,.18);
    --text:#1c2230; --muted:#5b6480; --faint:#8f97b0; --pattern:#42506f;
    --shadow:0 24px 50px -26px rgba(30,40,70,.35);
  }
  /* ===================== ACCENT PALETTES (grayish, professional) ===================== */
  :root[data-accent="slate"]   {--accent:#64748b;--accent-strong:#515e72;--accent-soft:rgba(100,116,139,.16)}
  :root[data-accent="bluegray"]{--accent:#5b7089;--accent-strong:#495b70;--accent-soft:rgba(91,112,137,.16)}
  :root[data-accent="graphite"]{--accent:#565b66;--accent-strong:#444852;--accent-soft:rgba(86,91,102,.16)}
  :root[data-accent="charcoal"]{--accent:#414753;--accent-strong:#333842;--accent-soft:rgba(65,71,83,.18)}
  :root[data-accent="steel"]   {--accent:#5a7896;--accent-strong:#496179;--accent-soft:rgba(90,120,150,.16)}
  :root[data-accent="cool"]    {--accent:#6b7280;--accent-strong:#565c68;--accent-soft:rgba(107,114,128,.16)}
  :root[data-accent="navy"]    {--accent:#3f4d67;--accent-strong:#323e53;--accent-soft:rgba(63,77,103,.20)}

  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden}
  [dir="rtl"] body{font-family:"Inter","Segoe UI","Tahoma",sans-serif}
  ::selection{background:var(--accent-soft)}

  /* smooth theme/accent transitions, disabled on first paint */
  body,.card,input,select,button,.entry,.drawer,.chip,.tabs,.swatch,.seg,.overlay,.meter,.meter>div,.badge{
    transition:background-color .35s ease, color .35s ease, border-color .35s ease,
      box-shadow .25s ease, transform .16s ease, filter .16s ease, opacity .3s ease}
  .no-transition, .no-transition *{transition:none!important}

  /* ===================== ABSTRACT SVG BACKGROUND ===================== */
  .bg{position:fixed;inset:0;z-index:0;color:var(--pattern);opacity:.05;pointer-events:none;overflow:hidden}
  .bg svg{position:absolute;inset:0;width:100%;height:100%}
  .bg .accentline{color:var(--accent)}

  .wrap{position:relative;z-index:1;max-width:1040px;margin:0 auto;padding:24px 22px 64px}

  /* ===================== HEADER ===================== */
  header{display:flex;align-items:center;gap:14px;padding:6px 2px 26px}
  .brand{display:flex;align-items:center;gap:12px;min-width:0}
  .brand .mark{width:44px;height:44px;border-radius:13px;display:grid;place-items:center;flex:0 0 auto;
    background:linear-gradient(135deg,var(--accent),var(--accent-strong));color:#fff;
    box-shadow:0 10px 24px -8px var(--accent)}
  .brand .mark svg{width:22px;height:22px}
  .brand h1{font-size:19px;margin:0;letter-spacing:-.3px;white-space:nowrap}
  .brand .sub{color:var(--muted);font-size:11.5px;margin-top:2px;display:flex;gap:7px;align-items:center}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}
  .spacer{flex:1}
  .hbtn{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;flex:0 0 auto;
    background:var(--surface);border:1px solid var(--border);color:var(--text);cursor:pointer;backdrop-filter:blur(8px)}
  .hbtn:hover{border-color:var(--border-2);transform:translateY(-1px)}
  .hbtn svg{width:19px;height:19px}
  .chip{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--border);
    padding:5px 7px 5px 5px;border-radius:999px;backdrop-filter:blur(8px)}
  .avatar{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:13px;
    background:linear-gradient(135deg,var(--accent),var(--accent-strong));color:#fff;flex:0 0 auto}

  /* ===================== CARDS ===================== */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:24px;
    margin-bottom:20px;box-shadow:var(--shadow);backdrop-filter:blur(16px)}
  .card h3{margin:0 0 18px;font-size:15px;letter-spacing:.2px;display:flex;align-items:center;gap:10px}
  .card h3 svg{width:18px;height:18px;color:var(--accent)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  @media(max-width:780px){.grid2{grid-template-columns:1fr}}

  /* ===================== FORMS ===================== */
  label{display:block;font-size:12px;color:var(--muted);margin:0 0 7px;font-weight:500}
  .field{position:relative}
  input[type=text],input[type=password],input:not([type]),select{
    width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:11px;
    padding:12px 13px;color:var(--text);font-size:14px;outline:none}
  input::placeholder{color:var(--faint)}
  input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .field .eye{position:absolute;inset-inline-end:8px;top:50%;transform:translateY(-50%);background:transparent;
    border:0;color:var(--muted);cursor:pointer;padding:6px;display:grid;place-items:center}
  .field .eye svg{width:17px;height:17px}
  .field input{padding-inline-end:38px}
  .gap{height:12px}
  .row{display:flex;gap:10px;flex-wrap:wrap}

  button{cursor:pointer;border:0;border-radius:11px;padding:12px 16px;font-size:14px;font-weight:600;color:#fff;
    background:linear-gradient(135deg,var(--accent),var(--accent-strong));letter-spacing:.2px;
    display:inline-flex;align-items:center;justify-content:center;gap:8px}
  button svg{width:16px;height:16px}
  button:hover{transform:translateY(-1px);filter:brightness(1.07)}
  button:active{transform:translateY(0) scale(.99)}
  button.ghost{background:var(--surface-3);border:1px solid var(--border-2);color:var(--text)}
  button.soft{background:var(--accent-soft);color:var(--accent);border:1px solid transparent}
  button.danger{background:transparent;border:1px solid var(--border-2);color:var(--muted)}
  button.danger:hover{border-color:#c15563;color:#e0687a}
  button.sm{padding:8px 11px;font-size:13px;border-radius:9px}
  button.block{width:100%}
  button[disabled]{opacity:.55;pointer-events:none}
  a.link{color:var(--accent);text-decoration:none;font-weight:600}
  a.link:hover{text-decoration:underline}

  .tabs{display:flex;gap:6px;background:var(--surface-2);padding:5px;border-radius:12px;margin-bottom:20px}
  .tabs button{flex:1;background:transparent;color:var(--muted);box-shadow:none}
  .tabs button:hover{transform:none;color:var(--text);filter:none}
  .tabs button.active{background:linear-gradient(135deg,var(--accent),var(--accent-strong));color:#fff}

  .hidden{display:none!important}
  .muted{color:var(--muted)} .faint{color:var(--faint)}
  .err{color:#e0687a;font-size:12.5px;margin-top:9px;min-height:15px}
  hr{border:0;border-top:1px solid var(--border);margin:18px 0}

  /* ===================== AUTH ===================== */
  #authView{max-width:430px;margin:5vh auto 0;animation:rise .45s ease}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @keyframes pop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:none}}
  .authhead{text-align:center;margin-bottom:22px}
  .authhead .big{width:58px;height:58px;border-radius:17px;margin:0 auto 12px;display:grid;place-items:center;
    background:linear-gradient(135deg,var(--accent),var(--accent-strong));color:#fff;
    box-shadow:0 14px 34px -10px var(--accent)}
  .authhead .big svg{width:28px;height:28px}
  .authhead h2{margin:0 0 4px;font-size:19px}
  .authhead p{margin:0;color:var(--muted);font-size:13px}
  .secnote{display:flex;align-items:center;gap:9px;font-size:11.5px;color:var(--faint);margin-top:14px}
  .secnote svg{width:15px;height:15px;flex:0 0 auto;color:var(--accent)}
  footer{text-align:center;color:var(--faint);font-size:11.5px;padding-top:8px}

  /* ===================== VAULT ===================== */
  .entry{display:flex;align-items:center;gap:14px;padding:14px;border:1px solid var(--border);border-radius:14px;
    margin-bottom:11px;background:var(--surface-2);animation:rise .3s ease}
  .entry:hover{border-color:var(--border-2);background:var(--surface-3)}
  .entry .ava{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-weight:700;font-size:16px;
    color:#fff;flex:0 0 auto}
  .entry .info{min-width:0;flex:1}
  .entry .label{font-weight:650;font-size:14.5px}
  .entry .meta{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .entry .pw{font-family:ui-monospace,"SF Mono",Menlo,monospace;letter-spacing:.5px;font-size:13px;color:var(--accent);margin-top:3px}
  .entry .acts{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
  .badge{min-width:30px;height:24px;padding:0 9px;display:inline-grid;place-items:center;background:var(--accent-soft);
    color:var(--accent);border-radius:8px;font-weight:700;font-size:12.5px}
  .empty{text-align:center;padding:34px 10px;color:var(--muted)}
  .empty svg{width:38px;height:38px;color:var(--faint);opacity:.7;margin-bottom:8px}

  /* meter, checks, generator */
  .meter{height:7px;border-radius:6px;background:var(--surface-3);overflow:hidden;margin-top:9px}
  .meter>div{height:100%;width:0;border-radius:6px}
  .checks{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px}
  .checks label{display:flex;align-items:center;gap:7px;color:var(--text);font-size:13px;margin:0;cursor:pointer}
  .checks input{width:auto;accent-color:var(--accent)}
  .rangewrap{display:flex;align-items:center;gap:12px}
  .rangewrap input[type=range]{flex:1;accent-color:var(--accent)}
  .genout{display:none;margin-top:12px;padding:11px 12px;background:var(--surface-3);border:1px dashed var(--border-2);
    border-radius:10px;font-family:ui-monospace,Menlo,monospace;word-break:break-all;font-size:13.5px;color:var(--accent);
    align-items:center;gap:10px}
  .genout.show{display:flex}

  /* ===================== SETTINGS DRAWER ===================== */
  .overlay{position:fixed;inset:0;background:rgba(4,6,12,.5);backdrop-filter:blur(3px);z-index:40;opacity:0;
    pointer-events:none}
  .overlay.show{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;inset-inline-end:0;height:100%;width:380px;max-width:92vw;z-index:41;
    background:var(--bg-2);border-inline-start:1px solid var(--border);box-shadow:var(--shadow);
    transform:translateX(100%);overflow-y:auto;padding:22px}
  [dir="rtl"] .drawer{transform:translateX(-100%)}
  .drawer.show{transform:translateX(0)!important}
  .drawer .dhead{display:flex;align-items:center;gap:10px;margin-bottom:20px}
  .drawer .dhead h2{font-size:17px;margin:0;flex:1}
  .section{margin-bottom:22px}
  .section .stitle{display:flex;align-items:center;gap:9px;font-size:12px;text-transform:uppercase;letter-spacing:.6px;
    color:var(--muted);margin-bottom:11px;font-weight:600}
  .section .stitle svg{width:15px;height:15px;color:var(--accent)}
  .seg{display:flex;gap:6px;background:var(--surface-2);padding:5px;border-radius:12px;border:1px solid var(--border)}
  .seg button{flex:1;background:transparent;color:var(--muted);box-shadow:none;font-weight:600}
  .seg button:hover{filter:none;transform:none;color:var(--text)}
  .seg button.active{background:linear-gradient(135deg,var(--accent),var(--accent-strong));color:#fff}
  .swatches{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .swatch{border:1px solid var(--border);background:var(--surface-2);border-radius:12px;padding:10px 6px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:7px}
  .swatch:hover{border-color:var(--border-2);transform:translateY(-1px)}
  .swatch .dotc{width:26px;height:26px;border-radius:50%;box-shadow:inset 0 0 0 2px rgba(255,255,255,.15)}
  .swatch .nm{font-size:10.5px;color:var(--muted);text-align:center;line-height:1.2}
  .swatch.active{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}
  /* live preview block */
  .preview{border:1px solid var(--border);border-radius:14px;padding:16px;background:var(--surface-2)}
  .preview .prow{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  .preview .pbar{height:7px;border-radius:6px;background:var(--surface-3);overflow:hidden}
  .preview .pbar>div{height:100%;width:66%;background:linear-gradient(90deg,var(--accent),var(--accent-strong))}

  /* toast */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--surface-2);
    border:1px solid var(--border-2);padding:12px 20px;border-radius:12px;opacity:0;transition:.3s;pointer-events:none;
    box-shadow:var(--shadow);font-size:13.5px;z-index:60;display:flex;align-items:center;gap:9px}
  .toast svg{width:16px;height:16px;color:var(--accent)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- ===================== ABSTRACT BACKGROUND ===================== -->
<div class="bg" aria-hidden="true">
  <svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" fill="none" stroke="currentColor">
    <defs>
      <pattern id="grid" width="46" height="46" patternUnits="userSpaceOnUse">
        <path d="M46 0H0V46" stroke-width="1"/>
      </pattern>
      <pattern id="dots" width="120" height="120" patternUnits="userSpaceOnUse">
        <circle cx="6" cy="6" r="1.4" fill="currentColor" stroke="none"/>
      </pattern>
    </defs>
    <rect width="1440" height="900" fill="url(#grid)"/>
    <rect width="1440" height="900" fill="url(#dots)"/>
    <!-- node network -->
    <g stroke-width="1.4" class="accentline">
      <circle cx="180" cy="160" r="5" fill="currentColor" stroke="none"/>
      <circle cx="360" cy="240" r="4" fill="currentColor" stroke="none"/>
      <circle cx="520" cy="130" r="4" fill="currentColor" stroke="none"/>
      <circle cx="300" cy="380" r="4" fill="currentColor" stroke="none"/>
      <path d="M180 160 L360 240 L520 130 M360 240 L300 380"/>
      <circle cx="1180" cy="640" r="5" fill="currentColor" stroke="none"/>
      <circle cx="1300" cy="520" r="4" fill="currentColor" stroke="none"/>
      <circle cx="1080" cy="760" r="4" fill="currentColor" stroke="none"/>
      <path d="M1180 640 L1300 520 M1180 640 L1080 760"/>
    </g>
    <!-- concentric circles -->
    <g stroke-width="1.3">
      <circle cx="1240" cy="180" r="40"/><circle cx="1240" cy="180" r="70"/><circle cx="1240" cy="180" r="100"/>
      <circle cx="150" cy="720" r="30"/><circle cx="150" cy="720" r="55"/>
    </g>
    <!-- hexagon outline -->
    <path d="M760 700 l52 30 v60 l-52 30 l-52 -30 v-60 z" stroke-width="1.4"/>
    <!-- thin diagonal lines -->
    <g stroke-width="1">
      <path d="M0 300 L1440 60"/><path d="M0 620 L1440 380"/><path d="M600 0 L900 900"/>
    </g>
    <!-- shield outline (tech) -->
    <path d="M980 300 l40 14 v34 c0 26 -18 40 -40 50 c-22 -10 -40 -24 -40 -50 v-34 z" stroke-width="1.4"/>
  </svg>
</div>

<div class="wrap">
  <header>
    <div class="brand">
      <div class="mark" data-ic="lock"></div>
      <div>
        <h1>SecureVault</h1>
        <div class="sub"><span class="dot"></span> <span data-i18n="app.subtitle"></span></div>
      </div>
    </div>
    <div class="spacer"></div>
    <div id="userchip" class="chip hidden">
      <span id="avatar" class="avatar"></span>
      <span id="whoami" style="font-size:13px;font-weight:600"></span>
      <button class="ghost sm" onclick="logout()" data-i18n="btn.logout"></button>
    </div>
    <button class="hbtn" title="Settings" onclick="openSettings()" data-ic="settings"></button>
  </header>

  <!-- ===================== AUTH ===================== -->
  <div id="authView">
    <div class="card">
      <div class="authhead">
        <div class="big" data-ic="lock"></div>
        <h2 id="authTitle"></h2>
        <p id="authSubtitle"></p>
      </div>
      <div class="tabs">
        <button id="tabLogin" class="active" onclick="switchTab('login')" data-i18n="tab.login"></button>
        <button id="tabRegister" onclick="switchTab('register')" data-i18n="tab.register"></button>
      </div>
      <label data-i18n="f.username"></label>
      <input id="authUser" data-i18n-ph="ph.username" autocomplete="username" onkeydown="if(event.key==='Enter')doAuth()" />
      <div class="gap"></div>
      <label data-i18n="f.master"></label>
      <div class="field">
        <input id="authPass" type="password" data-i18n-ph="ph.master" autocomplete="current-password" onkeydown="if(event.key==='Enter')doAuth()" />
        <button class="eye" data-ic="eye" onclick="togglePw('authPass',this)" tabindex="-1"></button>
      </div>
      <div class="gap"></div>
      <button id="authBtn" class="block" onclick="doAuth()"></button>
      <div id="authErr" class="err"></div>
      <div class="secnote"><span data-ic="shield"></span> <span data-i18n="secnote.auth"></span></div>
    </div>
    <footer data-i18n="footer.auth"></footer>
  </div>

  <!-- ===================== APP ===================== -->
  <div id="appView" class="hidden">
    <div class="grid2">
      <div class="card">
        <h3><span data-ic="plus"></span> <span data-i18n="add.title"></span></h3>
        <label data-i18n="f.label"></label>
        <input id="e_label" data-i18n-ph="ph.label" />
        <div class="gap"></div>
        <label data-i18n="f.account"></label>
        <input id="e_user" data-i18n-ph="ph.account" />
        <div class="gap"></div>
        <label><span data-i18n="f.website"></span> <span class="faint" data-i18n="opt.optional"></span></label>
        <input id="e_url" data-i18n-ph="ph.website" />
        <div class="gap"></div>
        <label data-i18n="f.password"></label>
        <div class="row">
          <div class="field" style="flex:1;min-width:150px">
            <input id="e_pass" type="password" data-i18n-ph="ph.password" />
            <button class="eye" data-ic="eye" onclick="togglePw('e_pass',this)" tabindex="-1"></button>
          </div>
          <button class="soft sm" style="flex:0 0 auto" onclick="fillGenerated()"><span data-ic="bolt"></span> <span data-i18n="btn.generate"></span></button>
        </div>
        <div class="gap"></div>
        <button class="block" onclick="addEntry()"><span data-ic="lock"></span> <span data-i18n="btn.save"></span></button>
        <div id="addErr" class="err"></div>
      </div>

      <div class="card">
        <h3><span data-ic="tools"></span> <span data-i18n="tools.title"></span></h3>
        <label data-i18n="tools.length"></label>
        <div class="rangewrap">
          <input id="genLen" type="range" min="8" max="40" value="20" oninput="document.getElementById('lenLabel').textContent=this.value" />
          <span id="lenLabel" class="badge">20</span>
        </div>
        <div class="checks">
          <label><input type="checkbox" id="c_up" checked> A-Z</label>
          <label><input type="checkbox" id="c_lo" checked> a-z</label>
          <label><input type="checkbox" id="c_di" checked> 0-9</label>
          <label><input type="checkbox" id="c_sy" checked> !@#$</label>
        </div>
        <div class="gap"></div>
        <button class="ghost block" onclick="generate()"><span data-ic="bolt"></span> <span data-i18n="tools.genBtn"></span></button>
        <div id="genOut" class="genout">
          <span id="genText" style="flex:1"></span>
          <button class="ghost sm" onclick="copyGen()"><span data-ic="copy"></span></button>
        </div>
        <hr>
        <label data-i18n="tools.strength"></label>
        <div class="field">
          <input id="strIn" type="password" data-i18n-ph="ph.test" oninput="checkStrength()" />
          <button class="eye" data-ic="eye" onclick="togglePw('strIn',this)" tabindex="-1"></button>
        </div>
        <div class="meter"><div id="strBar"></div></div>
        <div id="strText" class="muted" style="font-size:12px;margin-top:7px;min-height:15px"></div>
      </div>

/* ===================== STATE ===================== */
const STATE = {
  lang: localStorage.getItem('sv_lang')||'en',
  theme: localStorage.getItem('sv_theme')||'dark',
  accent: localStorage.getItem('sv_accent')||'slate',

};
let TOKEN=null;
const AVCOLORS=['#64748b','#5a7896','#6b7280','#5b7089','#565b66','#3f4d67','#7a8296'];

function $(id){return document.getElementById(id);}
function t(k){return (I18N[STATE.lang]&&I18N[STATE.lang][k])||I18N.en[k]||k;}
function toast(msg){const el=$('toast');el.innerHTML=IC.check+'<span>'+esc(msg)+'</span>';el.classList.add('show');
  clearTimeout(el._h);el._h=setTimeout(()=>el.classList.remove('show'),2400);}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function initials(s){return (s||'?').trim().charAt(0).toUpperCase();}
function colorFor(s){let h=0;for(const c of (s||'x'))h=(h*31+c.charCodeAt(0))>>>0;return AVCOLORS[h%AVCOLORS.length];}
function togglePw(id,btn){const el=$(id);const s=el.type==='password';el.type=s?'text':'password';
  btn.innerHTML=s?IC.eyeoff:IC.eye;}

/* ===================== APPLY PREFS ===================== */
function applyI18n(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n');const v=t(k);if(v!=null)el.textContent=v;});
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{const k=el.getAttribute('data-i18n-ph');const v=t(k);if(v!=null)el.placeholder=v;});
  document.documentElement.setAttribute('lang',STATE.lang);
  document.documentElement.setAttribute('dir',STATE.lang==='ar'?'rtl':'ltr');
  renderAuthText();
}
function renderAuthText(){
  $('authBtn').textContent = STATE.mode==='login'?t('btn.login'):t('btn.register');
  $('authTitle').textContent = STATE.mode==='login'?t('auth.loginTitle'):t('auth.regTitle');
  $('authSubtitle').textContent = STATE.mode==='login'?t('auth.loginSub'):t('auth.regSub');
}
function setLang(l){STATE.lang=l;localStorage.setItem('sv_lang',l);syncSettingsUI();applyI18n();}
function setTheme(th){STATE.theme=th;localStorage.setItem('sv_theme',th);document.documentElement.setAttribute('data-theme',th);syncSettingsUI();}
function setAccent(a){STATE.accent=a;localStorage.setItem('sv_accent',a);document.documentElement.setAttribute('data-accent',a);syncSettingsUI();}

function buildSwatches(){
  const box=$('swatches');box.innerHTML='';
  ACCENTS.forEach(a=>{
    const b=document.createElement('div');b.className='swatch'+(a.id===STATE.accent?' active':'');
    b.onclick=()=>setAccent(a.id);
    b.innerHTML=`<span class="dotc" style="background:${a.c}"></span><span class="nm">${STATE.lang==='ar'?a.ar:a.en}</span>`;
    box.appendChild(b);
  });
}
function syncSettingsUI(){
  $('langEn').classList.toggle('active',STATE.lang==='en');
  $('langAr').classList.toggle('active',STATE.lang==='ar');
  $('themeDark').classList.toggle('active',STATE.theme==='dark');
  $('themeLight').classList.toggle('active',STATE.theme==='light');
  buildSwatches();
}
function openSettings(){$('overlay').classList.add('show');$('drawer').classList.add('show');}
function closeSettings(){$('overlay').classList.remove('show');$('drawer').classList.remove('show');}

/* ===================== AUTH ===================== */
function switchTab(m){
  STATE.mode=m;
  $('tabLogin').classList.toggle('active',m==='login');
  $('tabRegister').classList.toggle('active',m==='register');
  $('authErr').textContent='';
  renderAuthText();
}
async function api(path, opts={}){
  opts.headers=Object.assign({'Content-Type':'application/json'},opts.headers||{});
  if(TOKEN) opts.headers['Authorization']='Bearer '+TOKEN;
  let r; try{ r=await fetch(path,opts); }catch(e){ throw new Error(t('msg.serverDown')); }
  if(r.status===204) return null;
  const data=await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(readableError(data.detail,r.status));
  return data;
}
function readableError(detail,status){
  if(typeof detail==='string') return detail;
  if(Array.isArray(detail)) return detail.map(e=>{
    const f=Array.isArray(e.loc)?e.loc[e.loc.length-1]:'input';let m=e.msg||'invalid value';
    if(/at least 8/.test(m))m='· min 8 chars';if(/at least 3/.test(m))m='· min 3 chars';if(/at least 1/.test(m))m='· required';
    const lbl={master_password:t('f.master'),username:t('f.username'),password:t('f.password'),label:t('f.label')}[f]||f;
    return lbl+' '+m;}).join(' · ');
  return 'Error '+status;
}
async function doAuth(){
  $('authErr').textContent='';
  const username=$('authUser').value.trim(),master_password=$('authPass').value;
  if(!username||!master_password){$('authErr').textContent=t('msg.needCreds');return;}
  const btn=$('authBtn');btn.disabled=true;btn.textContent=STATE.mode==='login'?t('st.loggingIn'):t('st.creating');
  try{
    const res=await api(STATE.mode==='login'?'/auth/login':'/auth/register',{method:'POST',body:JSON.stringify({username,master_password})});
    TOKEN=res.access_token;
    $('whoami').textContent=username;$('avatar').textContent=initials(username);$('avatar').style.background=`linear-gradient(135deg,${colorFor(username)},var(--accent-strong))`;
    enterApp();
  }catch(e){$('authErr').textContent=e.message;}
  finally{btn.disabled=false;renderAuthText();}
}
function logout(){
  api('/auth/logout',{method:'POST'}).catch(()=>{});
  TOKEN=null;$('authPass').value='';
  $('appView').classList.add('hidden');$('authView').classList.remove('hidden');
  $('userchip').classList.add('hidden');switchTab('login');
}
function enterApp(){
  $('authView').classList.add('hidden');$('appView').classList.remove('hidden');
  $('userchip').classList.remove('hidden');loadVault();
}

/* ===================== VAULT ===================== */
async function loadVault(){
  try{
    const items=await api('/vault');const list=$('vaultList');list.innerHTML='';
    $('vaultCount').textContent=items.length;
    $('vaultEmpty').style.display=items.length?'none':'block';
    for(const it of items){
      const div=document.createElement('div');div.className='entry';
      div.innerHTML=`
        <div class="ava" style="background:linear-gradient(135deg,${colorFor(it.label)},var(--accent-strong))">${esc(initials(it.label))}</div>
        <div class="info">
          <div class="label">${esc(it.label)}</div>
          <div class="meta">${esc(it.username||'—')}${it.url?' · '+esc(it.url):''}</div>
          <div class="pw" id="pw_${it.id}"></div>
        </div>
        <div class="acts">
          <button class="ghost sm" id="rev_${it.id}" onclick="reveal(${it.id})"><span data-ic="eye"></span> <span>${t('btn.reveal')}</span></button>
          <button class="ghost sm" onclick="copyPw(${it.id})"><span data-ic="copy"></span> <span>${t('btn.copy')}</span></button>
          <button class="danger sm" onclick="del(${it.id},'${esc(it.label)}')"><span data-ic="trash"></span></button>
        </div>`;
      list.appendChild(div);
    }
    injectIcons(list);
  }catch(e){toast(e.message);if(String(e.message).toLowerCase().includes('log in'))logout();}
}
async function addEntry(){
  $('addErr').textContent='';
  const label=$('e_label').value.trim(),password=$('e_pass').value;
  if(!label||!password){$('addErr').textContent=t('msg.needLabel');return;}
  try{
    await api('/vault',{method:'POST',body:JSON.stringify({label,username:$('e_user').value.trim(),url:$('e_url').value.trim(),password})});
    $('e_label').value=$('e_user').value=$('e_url').value=$('e_pass').value='';
    toast(t('msg.saved'));loadVault();
  }catch(e){$('addErr').textContent=e.message;}
}
async function reveal(id){
  const el=$('pw_'+id),btn=$('rev_'+id);
  if(el.textContent){el.textContent='';btn.innerHTML=IC.eye+' <span>'+t('btn.reveal')+'</span>';return;}
  try{const r=await api('/vault/'+id+'/reveal');el.textContent=r.password;btn.innerHTML=IC.eyeoff+' <span>'+t('btn.hide')+'</span>';}
  catch(e){toast(e.message);}
}
async function copyPw(id){
  try{const r=await api('/vault/'+id+'/reveal');await navigator.clipboard.writeText(r.password);
    toast(t('msg.copiedClear'));setTimeout(()=>navigator.clipboard.writeText('').catch(()=>{}),20000);}
  catch(e){toast(e.message);}
}
async function del(id,label){
  if(!confirm(t('msg.confirmDel').replace('{x}',label)))return;
  try{await api('/vault/'+id,{method:'DELETE'});toast(t('msg.deleted'));loadVault();}catch(e){toast(e.message);}
}

/* ===================== TOOLS ===================== */
async function generate(){
  const body={length:+$('genLen').value,use_upper:$('c_up').checked,use_lower:$('c_lo').checked,use_digits:$('c_di').checked,use_symbols:$('c_sy').checked};
  try{const r=await api('/tools/generate',{method:'POST',body:JSON.stringify(body)});
    $('genText').textContent=r.password;$('genOut').classList.add('show');return r.password;}
  catch(e){toast(e.message);}
}
async function fillGenerated(){const p=await generate();if(p){$('e_pass').value=p;toast(t('msg.inserted'));}}
async function copyGen(){const p=$('genText').textContent;if(!p)return;await navigator.clipboard.writeText(p);toast(t('msg.copied'));}
let strT;
function checkStrength(){
  clearTimeout(strT);
  strT=setTimeout(async()=>{
    const pw=$('strIn').value;
    if(!pw){$('strBar').style.width='0';$('strText').textContent='';return;}
    try{const r=await api('/tools/strength',{method:'POST',body:JSON.stringify({password:pw})});
      $('strBar').style.width=Math.min(100,r.entropy_bits)+'%';
      const col=r.entropy_bits<36?'#e0687a':r.entropy_bits<60?'#d9a441':'var(--accent)';
      $('strBar').style.background=col;
      $('strText').innerHTML=`<b style="color:${col}">${esc(r.rating)}</b> · ${r.entropy_bits} bits`+(r.suggestions.length?` · <span class="faint">${esc(r.suggestions[0])}</span>`:'');
    }catch(e){}
  },250);
}

document.addEventListener('DOMContentLoaded',()=>{
  injectIcons(document);
  syncSettingsUI();
  applyI18n();
  requestAnimationFrame(()=>document.documentElement.classList.remove('no-transition'));
});
</script>
