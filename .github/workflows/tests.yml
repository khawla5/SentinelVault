name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:          # lets you run it manually from the Actions tab

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi "uvicorn[standard]" argon2-cffi cryptography pyjwt \
                      httpx psutil "sqlalchemy>=2" pydantic pytest

      - name: Run test suite
        run: pytest -q

      - name: Verify the app imports and serves the UI
        run: |
          python - <<'PY'
          from fastapi.testclient import TestClient
          import backend.main as m
          c = TestClient(m.app)
          r = c.get("/")
          assert r.status_code == 200, f"UI route failed: {r.status_code}"
          assert "SentinelVault" in r.text, "UI did not render"
          h = c.get("/health").json()
          assert h["status"] == "ok", h
          print("smoke check passed:", h)
          PY
